variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  AWS_REGION: us-east-1
  IMAGE_NAME: tugas-akhir-airflow

stages:
  - build
  - deploy

build_airflow_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache python3 py3-pip aws-cli
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
  script:
    - docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:latest -f infra/docker/Dockerfile.airflow .
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_to_aws:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client aws-cli

    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts
  script:
    # 0. Ensure target directory exists
    - ssh ubuntu@$EC2_IP "mkdir -p ~/tugas_akhir"

    # 1. Update project files on server (mirror infra/ structure)
    - scp -r infra dags plugins src requirements.txt ubuntu@$EC2_IP:~/tugas_akhir/

    # 2. RUN setup scripts
    - ssh ubuntu@$EC2_IP "bash ~/tugas_akhir/infra/scripts/setup_server.sh && bash ~/tugas_akhir/infra/scripts/setup_swap.sh"

    # 3. Create .env on server from GitLab variables
    - |
      ssh ubuntu@$EC2_IP "cat > ~/tugas_akhir/.env << 'ENVEOF'
      SUPABASE_URL=${SUPABASE_URL}
      SUPABASE_KEY=${SUPABASE_KEY}
      SCIVAL_EMAIL=${SCIVAL_EMAIL}
      SCIVAL_PASS=${SCIVAL_PASS}
      SERPAPI_KEY=${SERPAPI_KEY}
      BD_PASS_SERP=${BD_PASS_SERP}
      BD_USER_SERP=${BD_USER_SERP}
      BD_PASS_UNLOCKER=${BD_PASS_UNLOCKER}
      BD_USER_UNLOCKER=${BD_USER_UNLOCKER}
      NEO4J_AUTH=neo4j/rizkyyk715
      NEO4J_PASSWORD=rizkyyk715
      GRAFANA_ADMIN_PASSWORD=rizkyyk715
      AIRFLOW_ADMIN_PASSWORD=rizkyyk715
      POSTGRES_PASSWORD=rizkyyk715
      HF_TOKEN=${HF_TOKEN}
      OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      GROQ_API_KEY=${GROQ_API_KEY}
      AIRFLOW_FERNET_KEY=${AIRFLOW_FERNET_KEY}
      AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}
      AWS_REGION=${AWS_REGION}
      EC2_IP=${EC2_IP}
      ENVEOF"

    # 4. Deploy Docker Compose (from project root, referencing infra/docker/)
    - |
      aws ecr get-login-password --region ${AWS_REGION} | \
      ssh ubuntu@${EC2_IP} "docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
    - ssh ubuntu@$EC2_IP "
        cd ~/tugas_akhir &&
        docker compose -p tugas_akhir -f infra/docker/docker-compose.prod.yml --env-file .env --profile monitoring pull &&
        docker compose -p tugas_akhir -f infra/docker/docker-compose.prod.yml --env-file .env --profile monitoring up -d --remove-orphans &&
        docker exec grafana grafana-cli admin reset-admin-password rizkyyk715 &&
        docker compose -p tugas_akhir -f infra/docker/docker-compose.prod.yml --env-file .env restart nginx
      "

  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
