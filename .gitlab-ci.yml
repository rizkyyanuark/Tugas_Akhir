variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  AWS_REGION: us-east-1
  IMAGE_NAME: tugas-akhir-airflow

stages:
  - build
  - deploy

build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache python3 py3-pip aws-cli
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
  script:
    - docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:latest -f infra/docker/Dockerfile.airflow .
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

deploy_to_aws:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client aws-cli

    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - eval $(ssh-agent -s)
    - ssh-add ~/.ssh/id_rsa
    - ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts
  script:
    # 0. Ensure target directory exists
    - ssh ubuntu@$EC2_IP "mkdir -p ~/tugas_akhir/data/raw ~/tugas_akhir/data/processed ~/tugas_akhir/notebooks/scraping"

    # 1. Reclaim ownership (Docker sets files to UID 50000, causing Permission Denied on re-deploy)
    - ssh ubuntu@$EC2_IP "sudo chown -R ubuntu:ubuntu ~/tugas_akhir/dags ~/tugas_akhir/plugins ~/tugas_akhir/src ~/tugas_akhir/infra ~/tugas_akhir/notebooks 2>/dev/null || true"
    # 2. Update project files on server (mirror infra/ structure)
    - scp -r infra dags plugins src requirements.txt ubuntu@$EC2_IP:~/tugas_akhir/
    - scp data/raw/dosen_infokom_final.csv ubuntu@$EC2_IP:~/tugas_akhir/data/raw/ || true
    - scp -r notebooks/scraping/scraping_modules ubuntu@$EC2_IP:~/tugas_akhir/notebooks/scraping/

    # 2. RUN setup scripts and fix permissions for Airflow (UID 50000)
    - ssh ubuntu@$EC2_IP "bash ~/tugas_akhir/infra/scripts/setup_server.sh && bash ~/tugas_akhir/infra/scripts/setup_swap.sh"
    - ssh ubuntu@$EC2_IP "sudo chown -R 50000:0 ~/tugas_akhir/data ~/tugas_akhir/logs ~/tugas_akhir/dags ~/tugas_akhir/plugins ~/tugas_akhir/src ~/tugas_akhir/notebooks || true"

    # 3. Create .env on server from GitLab variables
    - |
      ssh ubuntu@$EC2_IP "cat > ~/tugas_akhir/.env << 'ENVEOF'
      SUPABASE_URL=${SUPABASE_URL}
      SUPABASE_KEY=${SUPABASE_KEY}
      SCIVAL_EMAIL=${SCIVAL_EMAIL}
      SCIVAL_PASS=${SCIVAL_PASS}
      SERPAPI_KEY=${SERPAPI_KEY}
      BD_PASS_SERP=${BD_PASS_SERP}
      BD_USER_SERP=${BD_USER_SERP}
      BD_PASS_UNLOCKER=${BD_PASS_UNLOCKER}
      BD_USER_UNLOCKER=${BD_USER_UNLOCKER}
      BRIGHT_DATA_HOST=${BRIGHT_DATA_HOST}
      NEO4J_AUTH=neo4j/${PASSWORD}
      NEO4J_PASSWORD=${PASSWORD}
      GRAFANA_ADMIN_PASSWORD=${PASSWORD}
      AIRFLOW_ADMIN_PASSWORD=${PASSWORD}
      POSTGRES_PASSWORD=${PASSWORD}
      HF_TOKEN=${HF_TOKEN}
      OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      GROQ_API_KEY=${GROQ_API_KEY}
      AIRFLOW_FERNET_KEY=${AIRFLOW_FERNET_KEY}
      NEO4J_URI=bolt://${EC2_IP}:7687
      WEAVIATE_HOST=${EC2_IP}
      WEAVIATE_PORT=8081
      OPIK_URL=http://${EC2_IP}:5173
      OPIK_WORKSPACE=default
      AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}
      AWS_REGION=${AWS_REGION}
      EC2_IP=${EC2_IP}
      ENVEOF"

    # 4. Deploy Docker Compose (from project root, referencing infra/docker/)
    - |
      aws ecr get-login-password --region ${AWS_REGION} | \
      ssh ubuntu@${EC2_IP} "docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
    - |
      ssh ubuntu@$EC2_IP "
        cd ~/tugas_akhir &&

        echo '=== Phase 1 - Core Databases ===' &&
        docker compose -p tugas_akhir -f infra/docker/docker-compose.prod.yml --env-file .env up -d postgres neo4j &&
        sleep 10 &&

        echo '=== Phase 2 - Vector DB ===' &&
        docker compose -p tugas_akhir -f infra/docker/docker-compose.prod.yml --env-file .env --profile vectordb up -d &&
        sleep 5 &&

        echo '=== Phase 3 - Airflow ===' &&
        docker compose -p tugas_akhir -f infra/docker/docker-compose.prod.yml --env-file .env up -d airflow-init airflow-webserver airflow-scheduler &&
        sleep 15 &&

        echo '=== Phase 5 - Infra Monitoring ===' &&
        docker compose -p tugas_akhir -f infra/docker/docker-compose.prod.yml --env-file .env --profile monitoring up -d &&
        sleep 5 &&

        echo '=== Phase 6 - Nginx Reverse Proxy ===' &&
        docker compose -p tugas_akhir -f infra/docker/docker-compose.prod.yml --env-file .env up -d nginx --remove-orphans
      "

  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  environment:
    name: production
