# ══════════════════════════════════════════════════════════════
# GitLab CI/CD — Tugas Akhir (Yuxi-Style Architecture)
# ══════════════════════════════════════════════════════════════
# Triggered on push to main branch.
# Builds Docker images and deploys to AWS EC2.
# ══════════════════════════════════════════════════════════════

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  AWS_REGION: us-east-1

stages:
  - build
  - deploy

# ────────────────────────────────────────────────────────────
# BUILD: Build & push images to ECR
# ────────────────────────────────────────────────────────────
build_images:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache python3 py3-pip aws-cli
    - aws ecr get-login-password --region $AWS_REGION |
      docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
  script:
    # Build API (Backend FastAPI)
    - docker build
      -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/ta-api:latest
      -f docker/api.Dockerfile .
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/ta-api:latest

    # Build Web (Vue Frontend)
    - docker build
      -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/ta-web:latest
      -f docker/web.Dockerfile
      --target production .
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/ta-web:latest

    # Build Airflow
    - docker build
      -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/ta-airflow:latest
      -f docker/airflow.Dockerfile .
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/ta-airflow:latest

    # Build ETL Worker
    - docker build
      -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/ta-etl-worker:latest
      -f docker/etl-worker.Dockerfile .
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/ta-etl-worker:latest

  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ────────────────────────────────────────────────────────────
# DEPLOY: Push files + deploy containers on EC2
# ────────────────────────────────────────────────────────────
deploy_to_aws:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client aws-cli rsync
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - eval $(ssh-agent -s)
    - ssh-add ~/.ssh/id_rsa
    - ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts
  script:
    # 0. Ensure target directory exists
    - |
      ssh ubuntu@$EC2_IP "
        mkdir -p ~/tugas_akhir/{data/raw,data/processed,logs,docker/volumes}
      "

    # 1. Upload project files (new Yuxi-style structure)
    - scp -r backend docker configs scripts monitoring orchestration
        docker-compose.yml docker-compose.prod.yml Makefile
        ubuntu@$EC2_IP:~/tugas_akhir/
    - scp -r web/package.json web/pnpm-lock.yaml web/vite.config.js web/index.html web/public web/src
        ubuntu@$EC2_IP:~/tugas_akhir/web/ 2>/dev/null || true

    # 2. Run setup scripts
    - |
      ssh ubuntu@$EC2_IP "
        bash ~/tugas_akhir/scripts/setup_server.sh &&
        bash ~/tugas_akhir/scripts/setup_swap.sh
      "

    # 3. Create .env on server from GitLab CI/CD variables
    - |
      ssh ubuntu@$EC2_IP "cat > ~/tugas_akhir/.env << 'ENVEOF'
      SUPABASE_URL=${SUPABASE_URL}
      SUPABASE_KEY=${SUPABASE_KEY}
      SCIVAL_EMAIL=${SCIVAL_EMAIL}
      SCIVAL_PASS=${SCIVAL_PASS}
      SERPAPI_KEY=${SERPAPI_KEY}
      BD_PASS_SERP=${BD_PASS_SERP}
      BD_USER_SERP=${BD_USER_SERP}
      BD_PASS_UNLOCKER=${BD_PASS_UNLOCKER}
      BD_USER_UNLOCKER=${BD_USER_UNLOCKER}
      NEO4J_AUTH=neo4j/${PASSWORD}
      NEO4J_USER=neo4j
      NEO4J_PASSWORD=${PASSWORD}
      NEO4J_DATABASE=infokom-unesa
      NEO4J_URI=bolt://graph:7687
      MILVUS_HOST=milvus
      MILVUS_PORT=19530
      REDIS_URL=redis://redis:6379/0
      GRAFANA_ADMIN_PASSWORD=${PASSWORD}
      AIRFLOW_ADMIN_PASSWORD=${PASSWORD}
      POSTGRES_PASSWORD=${PASSWORD}
      HF_TOKEN=${HF_TOKEN}
      OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      GROQ_API_KEY=${GROQ_API_KEY}
      AIRFLOW_FERNET_KEY=${AIRFLOW_FERNET_KEY}
      OPIK_WORKSPACE=${OPIK_WORKSPACE}
      OPIK_API_KEY=${OPIK_API_KEY}
      TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      KG_BACKEND_PORT=8000
      KG_BACKEND_URL=http://api:8000
      GLINER_MODEL_NAME=urchade/gliner_small-v2.1
      YUXI_BRAND_FILE_PATH=backend/package/ta_backend_core/assistant/config/static/info.local.yaml
      ENVEOF"

    # 4. ECR Login on EC2
    - |
      aws ecr get-login-password --region ${AWS_REGION} | \
      ssh ubuntu@${EC2_IP} "docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

    # 5. Deploy with production overrides
    - |
      ssh ubuntu@$EC2_IP "
        cd ~/tugas_akhir &&

        echo '=== Phase 1: Core Databases ===' &&
        docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d postgres graph redis &&
        sleep 15 &&

        echo '=== Phase 2: Milvus Stack ===' &&
        docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d etcd minio milvus &&
        sleep 10 &&

        echo '=== Phase 3: Application Services ===' &&
        docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d api web telegram-bot &&
        sleep 5 &&

        echo '=== Phase 4: ETL (optional) ===' &&
        docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile etl up -d 2>/dev/null || true &&

        echo '=== Deployment Complete ===' &&
        docker compose ps
      "

  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
