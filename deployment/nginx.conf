# PROMETHEUS
server {
    listen 80;
    server_name prometheus.tugasakhir.space;

    location / {
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Default redirect (root domain to airflow)
server {
    listen 80;
    server_name tugasakhir.space www.tugasakhir.space;
    return 301 http://airflow.tugasakhir.space$request_uri;
}
