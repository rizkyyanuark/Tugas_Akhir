  - label: "Active Project"
    value: "V0.6.0"
    description: "Continuous improvement and student-led development"
    icon: "issues"
  - label: "Total Commits"
    value: "100+"
    description: "Active development iterations and feature updates"
    icon: "commits"
  - label: "Open-Source License"
