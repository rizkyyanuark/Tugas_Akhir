# ══════════════════════════════════════════════════════════════
# Tugas Akhir — Unified Docker Compose (AgenticRAG-Style)
# ══════════════════════════════════════════════════════════════
# Usage:
#   docker compose up --build              # Core services (api + web + dbs)
#   docker compose --profile etl up -d     # + Airflow ETL
#   docker compose --profile monitoring up # + Prometheus/Grafana
# ══════════════════════════════════════════════════════════════

# ── Shared environment anchor (AgenticRAG pattern: x-api-worker-env) ──
x-api-env: &api-env
  RUNNING_IN_DOCKER: "true"
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_KEY: ${SUPABASE_KEY:-}
  NEO4J_URI: bolt://graph:7687
  NEO4J_USERNAME: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-71509325}
  NEO4J_DATABASE: ${NEO4J_DATABASE:-infokom-unesa}
  MILVUS_HOST: milvus
  MILVUS_PORT: "19530"
  REDIS_URL: redis://redis:6379/0
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  HF_TOKEN: ${HF_TOKEN:-}
  GLINER_MODEL_NAME: ${GLINER_MODEL_NAME:-urchade/gliner_small-v2.1}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  OPIK_WORKSPACE: ${OPIK_WORKSPACE:-}
  OPIK_API_KEY: ${OPIK_API_KEY:-}
  NO_PROXY: localhost,127.0.0.1,milvus,graph,minio,etcd,redis,postgres

services:
  # ════════════════════════════════════════════════════════════
  # APPLICATION SERVICES
  # ════════════════════════════════════════════════════════════

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: ta-api:0.6.0
    container_name: api
    working_dir: /app
    volumes:
      - ./backend/server:/app/server
      - ./backend/package:/app/package
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./.env:/app/.env
    ports:
      - "${KG_BACKEND_PORT:-5050}:5050"
    networks:
      - ta-network
    env_file:
      - .env
    environment:
      <<: *api-env
    command: uvicorn server.main:app --host 0.0.0.0 --port 5050 --reload --reload-dir /app/server --reload-dir /app/package
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5050/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      graph:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

  telegram-bot:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: ta-api:0.6.0
    container_name: telegram-bot
    working_dir: /app
    volumes:
      - ./backend/server:/app/server
      - ./backend/package:/app/package
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./.env:/app/.env
    networks:
      - ta-network
    env_file:
      - .env
    environment:
      <<: *api-env
    command: python -m ta_backend_core.assistant.telegram_bot
    restart: unless-stopped
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: development
    image: ta-web:0.6.0
    container_name: web
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - ./web/vite.config.js:/app/vite.config.js
    ports:
      - "5173:5173"
    networks:
      - ta-network
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://api:5050
    command: pnpm run dev --host 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # DATABASES & INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════

  # region neo4j
  graph:
    image: neo4j:${NEO4J_VERSION:-5.15}-enterprise
    container_name: graph
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./docker/volumes/neo4j/data:/data
      - ./docker/volumes/neo4j/logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 60s
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-71509325}
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=256m
      - NEO4J_initial_dbms_default__database=${NEO4J_DATABASE:-infokom-unesa}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_http_listen__address=0.0.0.0:7474
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
      - NEO4J_server_bolt_tls__level=DISABLED
      - NEO4J_server_config_strict__validation_enabled=false
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_server_security_procedures_unrestricted=apoc.*,gds.*
    networks:
      - ta-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1500M
  # endregion neo4j

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./docker/volumes/milvus/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - ta-network
    restart: unless-stopped

  minio:
    container_name: minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./docker/volumes/milvus/minio:/minio_data
      - ./docker/volumes/milvus/minio_config:/root/.minio
    command: minio server /minio_data --address 0.0.0.0:9000 --console-address 0.0.0.0:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 30s
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ta-network
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.9
    container_name: milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MILVUS_LOG_LEVEL: error
    volumes:
      - ./docker/volumes/milvus/milvus:/var/lib/milvus
      - ./docker/volumes/milvus/logs:/var/lib/milvus/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 60s
      start_period: 120s
      timeout: 30s
      retries: 5
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - ta-network
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_VERSION:-13}
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-71509325}
      - POSTGRES_DB=${POSTGRES_DB:-airflow}
    volumes:
      - ./docker/volumes/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - ta-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/volumes/redis:/data
    networks:
      - ta-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  # ════════════════════════════════════════════════════════════
  # ETL / AIRFLOW (profile: etl)
  # ════════════════════════════════════════════════════════════

  etl-worker:
    profiles: ["etl"]
    build:
      context: .
      dockerfile: docker/etl-worker.Dockerfile
    image: tugas-akhir/etl-worker:latest
    container_name: etl-worker-dummy
    command: ["echo", "ETL Worker Image Built Successfully"]
    networks:
      - ta-network
    deploy:
      replicas: 0 # Does not stay running, used purely to force compose to build the image needed by Airflow DockerOperator


  airflow-init:
    profiles: ["etl"]
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    image: ta-airflow:2.8.1
    container_name: airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-71509325}@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./configs:/opt/airflow/configs:ro
      - etl_data:/opt/airflow/data
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --role Admin --username admin --password ${AIRFLOW_ADMIN_PASSWORD:-admin} --email admin@example.com --firstname Airflow --lastname Admin || true
      "
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ta-network
    deploy:
      resources:
        limits:
          memory: 512M

  airflow-webserver:
    profiles: ["etl"]
    image: ta-airflow:2.8.1
    container_name: airflow-webserver
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-71509325}@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__WEBSERVER__WORKERS: 1
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./configs:/opt/airflow/configs:ro
      - etl_data:/opt/airflow/data
    ports:
      - "${AIRFLOW_HTTP_PORT:-8080}:8080"
    command: webserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - ta-network
    deploy:
      resources:
        limits:
          memory: 4G

  airflow-scheduler:
    profiles: ["etl"]
    image: ta-airflow:2.8.1
    container_name: airflow-scheduler
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-71509325}@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./configs:/opt/airflow/configs:ro
      - etl_data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - ta-network
    deploy:
      resources:
        limits:
          memory: 4G

  # ════════════════════════════════════════════════════════════
  # MONITORING (profile: monitoring)
  # ════════════════════════════════════════════════════════════

  node-exporter:
    profiles: ["monitoring"]
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - ta-network
    deploy:
      resources:
        limits:
          memory: 128M

  cadvisor:
    profiles: ["monitoring"]
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - ta-network
    deploy:
      resources:
        limits:
          memory: 128M

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    depends_on:
      - node-exporter
      - cadvisor
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=72h"
    networks:
      - ta-network
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HTTP_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - ta-network
    deploy:
      resources:
        limits:
          memory: 256M

# ════════════════════════════════════════════════════════════
# VOLUMES & NETWORKS
# ════════════════════════════════════════════════════════════

volumes:
  etl_data:
  prometheus_data:
  grafana_data:

networks:
  ta-network:
    driver: bridge
    name: ta-network
