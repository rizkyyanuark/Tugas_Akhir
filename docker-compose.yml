services:
  neo4j:
    image: neo4j:5.15-enterprise
    environment:
      # Authentication - Use environment variable for security
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/rizkyyk123}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 256m
      NEO4J_initial_dbms_default__database: datascience
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"

      # Network bindings for Docker
      NEO4J_server_default__listen__address: "0.0.0.0"
      NEO4J_server_http_listen__address: "0.0.0.0:7474"
      NEO4J_server_bolt_listen__address: "0.0.0.0:7687"

      # Enable Prometheus metrics (FIXED: use new config names)
      NEO4J_server_metrics_prometheus_enabled: "true"
      NEO4J_server_metrics_prometheus_endpoint: "0.0.0.0:2004"
      NEO4J_server_metrics_enabled: "true"
      NEO4J_server_metrics_csv_enabled: "true"
      NEO4J_server_metrics_csv_interval: "30s"

      # Reduce auth lockout for development
      NEO4J_dbms_security_auth__lock__time: "5s"

      # Enable Graph Data Science plugin
      NEO4J_dbms_security_procedures_unrestricted: "gds.*"
      NEO4J_dbms_security_procedures_allowlist: "gds.*"
      NEO4JLABS_PLUGINS: '["graph-data-science"]'

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins

    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt Protocol
      - "2004:2004" # Prometheus Metrics

    # Healthcheck for better monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1500m
        reservations:
          cpus: "1"
          memory: 512m

  node_exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    command:
      - "--path.procfs=/proc"
      - "--path.sysfs=/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - node_exporter
      - neo4j
      - weaviate
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=72h"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      # Security - Use environment variable for admin password
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/neo4j-dashboard.json

    # Healthcheck for Grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    restart: unless-stopped

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.9
    ports:
      - "8080:8080"
      - "50051:50051"
      - "2112:2112"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "text2vec-transformers"
      ENABLE_MODULES: "text2vec-transformers"
      TRANSFORMERS_INFERENCE_API: "http://t2v-transformers:8080"
      CLUSTER_HOSTNAME: "node1"
      PROMETHEUS_MONITORING_ENABLED: "true"
      PROMETHEUS_MONITORING_GROUP: "weaviate"
      QUERY_MAXIMUM_RESULTS: 10000
      GOMEMLIMIT: "1536MiB"
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  t2v-transformers:
    image: cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-paraphrase-multilingual-MiniLM-L12-v2
    environment:
      ENABLE_CUDA: "0"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  neo4j_import:
  prometheus_data:
  grafana_data:
  weaviate_data:
