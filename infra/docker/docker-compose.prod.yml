name: tugas_akhir
# ==========================================
# PRODUCTION DOCKER COMPOSE - UNESA INFOKOM
# ==========================================
# Deployed via GitLab CI/CD to AWS EC2.
# Uses ECR images for Airflow, public images for everything else.
#
# HOW TO DEPLOY:
# Push to main branch → GitLab CI auto-deploys via:
#   docker compose -f infra/docker/docker-compose.prod.yml \
#     --profile monitoring --profile vectordb --profile llm-monitoring up -d
# ==========================================

services:
  # --- CORE DATABASE ---
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # --- AIRFLOW DB INIT (runs once) ---
  airflow-init:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/tugas-akhir-airflow:latest
    container_name: airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --role Admin --username admin --password ${AIRFLOW_ADMIN_PASSWORD} --email admin@example.com --firstname admin --lastname admin || true
      "
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M

  # --- AIRFLOW WEBSERVER ---
  airflow-webserver:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/tugas-akhir-airflow:latest
    container_name: airflow-webserver
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__PARALLELISM=4
      - AIRFLOW__CORE__DAG_CONCURRENCY=2
      - AIRFLOW__WEBSERVER__WORKERS=2
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - PYTHONPATH=/opt/airflow:/opt/airflow/notebooks/scraping
    env_file:
      - ../../.env
    volumes:
      - ../../dags:/opt/airflow/dags
      - ../../logs:/opt/airflow/logs
      - ../../plugins:/opt/airflow/plugins
      - ../../src:/opt/airflow/src
      - ../../data:/opt/airflow/data
      - ../../notebooks:/opt/airflow/notebooks
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    deploy:
      resources:
        limits:
          memory: 800M

  # --- AIRFLOW SCHEDULER ---
  airflow-scheduler:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/tugas-akhir-airflow:latest
    container_name: airflow-scheduler
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - PYTHONPATH=/opt/airflow:/opt/airflow/notebooks/scraping
    env_file:
      - ../../.env
    volumes:
      - ../../dags:/opt/airflow/dags
      - ../../logs:/opt/airflow/logs
      - ../../plugins:/opt/airflow/plugins
      - ../../src:/opt/airflow/src
      - ../../data:/opt/airflow/data
      - ../../notebooks:/opt/airflow/notebooks
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    deploy:
      resources:
        limits:
          memory: 800M

  # --- NEO4J GRAPH DATABASE ---
  neo4j:
    image: neo4j:5.15
    container_name: neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
      - NEO4J_initial_dbms_default__database=Infokom_unesa
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_http_listen__address=0.0.0.0:7474
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
      - NEO4J_server_bolt_tls__level=DISABLED
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
       - "7474:7474"
       - "7687:7687"
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  # --- VECTOR DATABASE (GraphRAG) ---
  # Uses text2vec-huggingface (remote API via HF_TOKEN).
  # Lightweight: no local ML container needed (~0 extra RAM).
  weaviate:
    profiles: ["vectordb"]
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.9
    container_name: weaviate
    ports:
      - "8081:8080"
      - "50051:50051"
    env_file:
      - ../../.env
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "text2vec-huggingface"
      ENABLE_MODULES: "text2vec-huggingface"
      HUGGINGFACE_APIKEY: ${HF_TOKEN}
      CLUSTER_HOSTNAME: "node1"
      PROMETHEUS_MONITORING_ENABLED: "true"
      PROMETHEUS_MONITORING_GROUP: "weaviate"
      QUERY_MAXIMUM_RESULTS: 10000
      GOMEMLIMIT: "1536MiB"
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # --- LLM MONITORING (Opik) ---
  # Dashboard: http://<EC2_IP>:5173
  # SDK: opik.configure(use_local=True)
  opik-mysql:
    profiles: ["llm-monitoring"]
    image: mysql:8.4.2
    container_name: opik-mysql
    environment:
      MYSQL_ROOT_PASSWORD: opik
      MYSQL_DATABASE: opik
      MYSQL_USER: opik
      MYSQL_PASSWORD: opik
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      timeout: 1s
      interval: 5s
      retries: 60
    volumes:
      - opik_mysql:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M

  opik-redis:
    profiles: ["llm-monitoring"]
    image: redis:7.2.4-alpine3.19
    container_name: opik-redis
    command: redis-server --requirepass opik --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "6379"]
      interval: 5s
      timeout: 4s
      retries: 20
    volumes:
      - opik_redis:/data
    deploy:
      resources:
        limits:
          memory: 128M

  opik-zookeeper:
    profiles: ["llm-monitoring"]
    image: zookeeper:3.8.0
    container_name: opik-zookeeper
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "ruok"
    healthcheck:
      test: ['CMD-SHELL', 'echo "ruok" | nc localhost 2181 || exit 1']
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 128M

  opik-clickhouse-init:
    profiles: ["llm-monitoring"]
    image: alpine:latest
    volumes:
      - ./clickhouse_config:/clickhouse_config_files
      - opik_clickhouse_config:/config
    command: |
      sh -c "
        cp -r /clickhouse_config_files/* /config/ && 
        chown -R 1000:1000 /config
      "

  opik-clickhouse:
    profiles: ["llm-monitoring"]
    image: clickhouse/clickhouse-server:25.3.6.56-alpine
    container_name: opik-clickhouse
    environment:
      CLICKHOUSE_DB: opik
      CLICKHOUSE_USER: opik
      CLICKHOUSE_PASSWORD: opik
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 60
    depends_on:
      opik-zookeeper:
        condition: service_healthy
      opik-clickhouse-init:
        condition: service_completed_successfully
    volumes:
      - opik_clickhouse:/var/lib/clickhouse
      - opik_clickhouse_config:/etc/clickhouse-server/config.d
    deploy:
      resources:
        limits:
          memory: 512M

  opik-backend:
    profiles: ["llm-monitoring"]
    image: ghcr.io/comet-ml/opik/opik-backend:latest
    container_name: opik-backend
    command: ["bash", "-c", "./run_db_migrations.sh && ./entrypoint.sh"]
    environment:
      STATE_DB_PROTOCOL: "jdbc:mysql://"
      STATE_DB_URL: "opik-mysql:3306/opik?createDatabaseIfNotExist=true&rewriteBatchedStatements=true"
      STATE_DB_DATABASE_NAME: opik
      STATE_DB_USER: opik
      STATE_DB_PASS: opik
      ANALYTICS_DB_MIGRATIONS_URL: "jdbc:clickhouse://opik-clickhouse:8123"
      ANALYTICS_DB_MIGRATIONS_USER: opik
      ANALYTICS_DB_MIGRATIONS_PASS: opik
      ANALYTICS_DB_PROTOCOL: "HTTP"
      ANALYTICS_DB_HOST: "opik-clickhouse"
      ANALYTICS_DB_PORT: 8123
      ANALYTICS_DB_DATABASE_NAME: opik
      ANALYTICS_DB_USERNAME: opik
      ANALYTICS_DB_PASS: opik
      JAVA_OPTS: "-Xmx512m -XX:+UseG1GC -XX:MaxRAMPercentage=80.0"
      REDIS_URL: redis://:opik@opik-redis:6379/
      OPIK_USAGE_REPORT_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health-check"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s
    depends_on:
      opik-mysql:
        condition: service_healthy
      opik-clickhouse:
        condition: service_healthy
      opik-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M

  opik-frontend:
    profiles: ["llm-monitoring"]
    image: ghcr.io/comet-ml/opik/opik-frontend:latest
    container_name: opik-frontend
    ports:
      - "5173:5173"
    depends_on:
      opik-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:5173/health"]
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      NGINX_PORT: 5173
    deploy:
      resources:
        limits:
          memory: 128M

  # --- MONITORING ---
  node_exporter:
    profiles: ["monitoring"]
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    deploy:
      resources:
        limits:
          memory: 128M

  cadvisor:
    profiles: ["monitoring"]
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          memory: 128M

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: always
    depends_on:
      - node_exporter
      - cadvisor
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=72h"
      - "--web.external-url=https://prometheus.tugasakhir.space/"
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_DISABLE_INITIAL_ADMIN_PASSWORD_CHANGE=true
      - GF_SERVER_ROOT_URL=https://grafana.tugasakhir.space/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    deploy:
      resources:
        limits:
          memory: 256M

  # --- REVERSE PROXY ---
  nginx:
    image: nginx:stable-alpine
    container_name: reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - airflow-webserver
      - neo4j
    restart: always

volumes:
  postgres-db-volume:
  neo4j_data:
  neo4j_logs:
  weaviate_data:
  # LLM Monitoring (Opik)
  opik_mysql:
  opik_redis:
  opik_clickhouse:
  opik_clickhouse_config:
  # Infrastructure Monitoring
  prometheus_data:
  grafana_data:
