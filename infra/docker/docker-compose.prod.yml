name: tugas_akhir
# ==========================================
# PRODUCTION DOCKER COMPOSE - UNESA INFOKOM
# ==========================================
# Deployed via GitLab CI/CD to AWS EC2.
# Uses ECR images for Airflow, public images for everything else.
#
# HOW TO DEPLOY:
# Push to main branch → GitLab CI auto-deploys via:
#   docker compose -f infra/docker/docker-compose.prod.yml \
#     --profile monitoring --profile vectordb --profile llm-monitoring up -d
# ==========================================

services:
  # --- CORE DATABASE ---
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      retries: 5
      start_period: 300s
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # --- AIRFLOW DB INIT (runs once) ---
  airflow-init:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/tugas-akhir-airflow:latest
    container_name: airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --role Admin --username admin --password ${AIRFLOW_ADMIN_PASSWORD} --email admin@example.com --firstname admin --lastname admin || true
      "
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M

  # --- AIRFLOW WEBSERVER ---
  airflow-webserver:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/tugas-akhir-airflow:latest
    container_name: airflow-webserver
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__PARALLELISM=4
      - AIRFLOW__CORE__DAG_CONCURRENCY=2
      - AIRFLOW__WEBSERVER__WORKERS=1
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - PYTHONPATH=/opt/airflow:/opt/airflow/notebooks/scraping
    env_file:
      - ../../.env
    volumes:
      - ../../dags:/opt/airflow/dags
      - ../../logs:/opt/airflow/logs
      - ../../plugins:/opt/airflow/plugins
      - ../../src:/opt/airflow/src
      - ../../data:/opt/airflow/data
      - ../../notebooks:/opt/airflow/notebooks
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    deploy:
      resources:
        limits:
          memory: 600M

  # --- AIRFLOW SCHEDULER ---
  airflow-scheduler:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/tugas-akhir-airflow:latest
    container_name: airflow-scheduler
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - PYTHONPATH=/opt/airflow:/opt/airflow/notebooks/scraping
    env_file:
      - ../../.env
    volumes:
      - ../../dags:/opt/airflow/dags
      - ../../logs:/opt/airflow/logs
      - ../../plugins:/opt/airflow/plugins
      - ../../src:/opt/airflow/src
      - ../../data:/opt/airflow/data
      - ../../notebooks:/opt/airflow/notebooks
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    deploy:
      resources:
        limits:
          memory: 600M

  # --- NEO4J GRAPH DATABASE ---
  neo4j:
    image: neo4j:5.15
    container_name: neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
      - NEO4J_initial_dbms_default__database=infokom-unesa
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_http_listen__address=0.0.0.0:7474
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
      - NEO4J_server_bolt_tls__level=DISABLED
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 1G

  # --- VECTOR DATABASE (GraphRAG) ---
  # Uses text2vec-huggingface (remote API via HF_TOKEN).
  # Lightweight: no local ML container needed (~0 extra RAM).
  weaviate:
    profiles: [ "vectordb" ]
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.9
    container_name: weaviate
    ports:
      - "8081:8080"
      - "50051:50051"
    env_file:
      - ../../.env
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "text2vec-huggingface"
      ENABLE_MODULES: "text2vec-huggingface"
      HUGGINGFACE_APIKEY: ${HF_TOKEN}
      CLUSTER_HOSTNAME: "node1"
      PROMETHEUS_MONITORING_ENABLED: "true"
      PROMETHEUS_MONITORING_GROUP: "weaviate"
      QUERY_MAXIMUM_RESULTS: 10000
      GOMEMLIMIT: "800MiB"
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M


  # --- MONITORING ---
  node_exporter:
    profiles: [ "monitoring" ]
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    deploy:
      resources:
        limits:
          memory: 128M

  cadvisor:
    profiles: [ "monitoring" ]
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          memory: 128M

  prometheus:
    profiles: [ "monitoring" ]
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: always
    depends_on:
      - node_exporter
      - cadvisor
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=72h"
      - "--web.external-url=https://prometheus.tugasakhir.space/"
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    profiles: [ "monitoring" ]
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_DISABLE_INITIAL_ADMIN_PASSWORD_CHANGE=true
      - GF_SERVER_ROOT_URL=https://grafana.tugasakhir.space/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    deploy:
      resources:
        limits:
          memory: 256M

  # --- REVERSE PROXY ---
  nginx:
    image: nginx:stable-alpine
    container_name: reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  # --- STREAMLIT FRONTEND ---
  frontend:
    image: python:3.10-slim
    container_name: streamlit-frontend
    hostname: streamlit
    working_dir: /app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=infokom-unesa
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - OPIK_URL=http://opik-backend:8080
      - OPIK_WORKSPACE=default
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ../../src:/app/src
      - ../../requirements-graphrag.txt:/app/requirements.txt
      - ../../data:/app/data
      - ../../.env:/app/.env
      - pip_cache:/root/.cache/pip
    command: >
      bash -c "if ! command -v streamlit &> /dev/null; then pip install --no-cache-dir -r requirements.txt; fi && streamlit run src/frontend/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true"
    depends_on:
      neo4j:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 384M

  # ==========================================
  # [OPTIONAL: OPIK LLM MONITORING]
  # ==========================================
  # Ultra-lightweight config for 4GB EC2.
  # Activate with: --profile llm-monitoring
  # Total RAM budget: ~1.4GB (uses swap heavily)
  # ==========================================

  opik-mysql:
    profiles: [ "llm-monitoring" ]
    image: mysql:8.4.2
    container_name: opik-mysql
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: opik
      MYSQL_DATABASE: opik
      MYSQL_USER: opik
      MYSQL_PASSWORD: opik
    command: >
      --innodb-buffer-pool-size=64M
      --key-buffer-size=8M
      --max-connections=20
      --table-open-cache=64
      --thread-cache-size=4
      --innodb-log-buffer-size=4M
      --tmp-table-size=8M
      --max-heap-table-size=8M
      --performance-schema=OFF
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent" ]
      timeout: 3s
      interval: 5s
      retries: 30
    volumes:
      - opik_mysql:/var/lib/mysql
    restart: on-failure:3
    deploy:
      resources:
        limits:
          memory: 256M

  opik-redis:
    profiles: [ "llm-monitoring" ]
    image: redis:7.2.4-alpine3.19
    container_name: opik-redis
    hostname: redis
    command: >
      redis-server
      --requirepass opik
      --maxmemory 48mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "6379" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - opik_redis:/data
    restart: on-failure:3
    deploy:
      resources:
        limits:
          memory: 64M

  opik-zookeeper:
    profiles: [ "llm-monitoring" ]
    image: zookeeper:3.9.4
    container_name: opik-zookeeper
    hostname: zookeeper
    user: root
    entrypoint:
      - /bin/bash
      - -c
      - |
        mkdir -p /bitnami/zookeeper/data
        chown -R zookeeper:zookeeper /bitnami/zookeeper
        exec gosu zookeeper /docker-entrypoint.sh zkServer.sh start-foreground
    environment:
      JVMFLAGS: "-Xmx64m -Xms32m"
      ZOO_4LW_COMMANDS_WHITELIST: "srvr,ruok"
      ZOO_DATA_DIR: /bitnami/zookeeper/data
      ZOO_DATA_LOG_DIR: /bitnami/zookeeper/data
    healthcheck:
      test: [ "CMD-SHELL", "echo ruok | nc localhost 2181 | grep -q imok" ]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - opik_zookeeper:/bitnami/zookeeper
    restart: on-failure:3
    deploy:
      resources:
        limits:
          memory: 128M

  opik-clickhouse-init:
    profiles: [ "llm-monitoring" ]
    image: alpine:latest
    container_name: opik-clickhouse-init
    volumes:
      - ../opik/clickhouse_config:/clickhouse_config_files
      - opik_clickhouse_config:/config
    command: |
      sh -c "
        cp -r /clickhouse_config_files/* /config/ &&
        chown -R 1000:1000 /config
      "
    restart: "no"

  opik-clickhouse:
    profiles: [ "llm-monitoring" ]
    image: clickhouse/clickhouse-server:25.3.6.56-alpine
    container_name: opik-clickhouse
    hostname: clickhouse
    environment:
      CLICKHOUSE_DB: opik
      CLICKHOUSE_USER: opik
      CLICKHOUSE_PASSWORD: opik
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - opik_clickhouse:/var/lib/clickhouse
      - opik_clickhouse_logs:/var/log/clickhouse-server
      - opik_clickhouse_config:/etc/clickhouse-server/config.d
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping" ]
      interval: 5s
      timeout: 3s
      retries: 30
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      opik-zookeeper:
        condition: service_healthy
      opik-clickhouse-init:
        condition: service_completed_successfully
    restart: on-failure:3
    deploy:
      resources:
        limits:
          memory: 384M

  opik-minio:
    profiles: [ "llm-monitoring" ]
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: opik-minio
    environment:
      MINIO_ROOT_USER: THAAIOSFODNN7EXAMPLE
      MINIO_ROOT_PASSWORD: LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    command: server --console-address ":9090" /data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s
    volumes:
      - opik_minio:/data
    restart: on-failure:3
    deploy:
      resources:
        limits:
          memory: 128M

  opik-mc:
    profiles: [ "llm-monitoring" ]
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: opik-mc
    depends_on:
      opik-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set s3 http://minio:9000 THAAIOSFODNN7EXAMPLE LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY --api S3v4 ;
      /usr/bin/mc mb --ignore-existing s3/public;
      /usr/bin/mc anonymous set download s3/public/;
      "
    restart: "no"

  opik-backend:
    profiles: [ "llm-monitoring" ]
    image: ghcr.io/comet-ml/opik/opik-backend:latest
    container_name: opik-backend
    hostname: backend
    command: [ "bash", "-c", "./run_db_migrations.sh && ./entrypoint.sh" ]
    environment:
      DOCKER_BUILDKIT: 1
      STATE_DB_PROTOCOL: "jdbc:mysql://"
      STATE_DB_URL: "mysql:3306/opik?createDatabaseIfNotExist=true&rewriteBatchedStatements=true"
      STATE_DB_DATABASE_NAME: opik
      STATE_DB_USER: opik
      STATE_DB_PASS: opik
      ANALYTICS_DB_MIGRATIONS_URL: "jdbc:clickhouse://clickhouse:8123"
      ANALYTICS_DB_MIGRATIONS_USER: opik
      ANALYTICS_DB_MIGRATIONS_PASS: opik
      ANALYTICS_DB_PROTOCOL: "HTTP"
      ANALYTICS_DB_HOST: "clickhouse"
      ANALYTICS_DB_PORT: 8123
      ANALYTICS_DB_DATABASE_NAME: opik
      ANALYTICS_DB_USERNAME: opik
      ANALYTICS_DB_PASS: opik
      JAVA_OPTS: "-Dliquibase.propertySubstitutionEnabled=true -XX:+UseG1GC -XX:MaxRAMPercentage=70.0 -XX:+UseStringDeduplication"
      REDIS_URL: redis://:opik@redis:6379/
      OPIK_OTEL_SDK_ENABLED: false
      OPIK_USAGE_REPORT_ENABLED: false
      AWS_ACCESS_KEY_ID: THAAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      IS_MINIO: true
      S3_URL: http://minio:9000
      PYTHON_EVALUATOR_URL: ""
      TOGGLE_OPIK_AI_ENABLED: "false"
      TOGGLE_GUARDRAILS_ENABLED: "false"
      TOGGLE_RUNNERS_ENABLED: "false"
      CORS: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health-check" ]
      interval: 10s
      timeout: 30s
      retries: 60
      start_period: 30s
    depends_on:
      opik-mysql:
        condition: service_healthy
      opik-clickhouse:
        condition: service_healthy
      opik-minio:
        condition: service_healthy
      opik-redis:
        condition: service_healthy
    tmpfs:
      - /tmp
    restart: on-failure:5
    deploy:
      resources:
        limits:
          memory: 384M

  opik-frontend:
    profiles: [ "llm-monitoring" ]
    image: ghcr.io/comet-ml/opik/opik-frontend:latest
    container_name: opik-frontend
    hostname: frontend
    ports:
      - "5173:5173"
    depends_on:
      opik-backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:5173/health" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 5s
    environment:
      NGINX_PORT: 5173
    restart: on-failure:3
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres-db-volume:
  neo4j_data:
  neo4j_logs:
  weaviate_data:

  prometheus_data:
  grafana_data:

  # Opik volumes
  opik_mysql:
  opik_redis:
  opik_zookeeper:
  opik_clickhouse:
  opik_clickhouse_logs:
  opik_clickhouse_config:
  opik_minio:

  # Streamlit pip cache
  pip_cache:
