name: tugas_akhir
# ==========================================
# UNIFIED DOCKER COMPOSE FILE UNESA INFOKOM
# ==========================================
# HOW TO RUN (from project root):
# 1. Base Project (Airflow + Neo4j):
#    make dev
#
# 2. With Vector DB:
#    docker compose -f infra/docker/docker-compose.yml --profile vectordb up -d
#
# 3. With LLM Monitoring:
#    docker compose -f infra/docker/docker-compose.yml --profile llm-monitoring up -d
#
# 4. With All Profiles:
#    make dev-all
#
# 5. Stop Everything:
#    make down
# ==========================================

services:

  # ==========================================
  # [CORE SYSTEM: AIRFLOW ETL]
  # ==========================================
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-airflow}
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      retries: 5
    restart: always

  airflow-init:
    image: apache/airflow:2.8.1-python3.10
    env_file:
      - ../../.env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=airflow
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-airflow}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate && airflow users create  --username admin  --password ${AIRFLOW_ADMIN_PASSWORD:-rizkyyk715}  --firstname Airflow  --lastname Admin \ --role Admin \ --email admin@example.com || true"

  airflow-webserver:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.airflow
    restart: always
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8080:8080"
    volumes:
      - ../../dags:/opt/airflow/dags
      - ../../src:/opt/airflow/src
      - ../../data:/opt/airflow/data
      - ../../logs:/opt/airflow/logs
      - ../../plugins:/opt/airflow/plugins
      - ../../notebooks:/opt/airflow/notebooks
    command: airflow webserver

  airflow-scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.airflow
    restart: always
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ../../dags:/opt/airflow/dags
      - ../../src:/opt/airflow/src
      - ../../data:/opt/airflow/data
      - ../../logs:/opt/airflow/logs
      - ../../plugins:/opt/airflow/plugins
      - ../../notebooks:/opt/airflow/notebooks
    command: airflow scheduler

  # ==========================================
  # [CORE SYSTEM: GRAPH DATABASE]
  # ==========================================
  neo4j:
    image: neo4j:5.15-enterprise
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=256m
      - NEO4J_initial_dbms_default__database=infokom-unesa
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_default__listen__address=0.0.0.0
      - NEO4J_server_http_listen__address=0.0.0.0:7474
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
      - NEO4J_server_bolt_tls__level=DISABLED
      - NEO4J_server_metrics_prometheus_enabled=true
      - NEO4J_server_metrics_prometheus_endpoint=0.0.0.0:2004
      - NEO4J_server_metrics_enabled=true
      - NEO4J_server_metrics_csv_enabled=true
      - NEO4J_server_metrics_csv_interval=30s
      - NEO4J_dbms_security_auth__lock__time=5s
      - NEO4J_dbms_security_procedures_unrestricted=gds.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*
      - NEO4JLABS_PLUGINS=["graph-data-science"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt Protocol
      - "2004:2004" # Prometheus Metrics
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1500m
        reservations:
          cpus: "1"
          memory: 512m

  # ==========================================
  # [OPTIONAL: VECTOR DATABASE (GraphRAG)]
  # ==========================================
  # Uses text2vec-huggingface (remote API) — lightweight, no local ML container needed.
  # Requires HF_TOKEN in .env for authentication.
  weaviate:
    profiles: [ "vectordb" ]
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.9
    container_name: weaviate
    ports:
      - "8081:8080"
      - "50051:50051"
    env_file:
      - ../../.env
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "text2vec-huggingface"
      ENABLE_MODULES: "text2vec-huggingface"
      HUGGINGFACE_APIKEY: ${HF_TOKEN}
      CLUSTER_HOSTNAME: "node1"
      PROMETHEUS_MONITORING_ENABLED: "true"
      PROMETHEUS_MONITORING_GROUP: "weaviate"
      QUERY_MAXIMUM_RESULTS: 10000
      GOMEMLIMIT: "1536MiB"
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ==========================================
  # [OPTIONAL: LLM MONITORING (Opik)]
  # ==========================================
  # Lightweight Opik stack for LLM observability.
  # Requires: MySQL + ClickHouse + Redis + Opik Backend + Frontend
  # Dashboard: http://<EC2_IP>:5173
  # SDK config: opik.configure(use_local=True)
  opik-mysql:
    profiles: [ "llm-monitoring" ]
    image: mysql:8.4.2
    container_name: opik-mysql
    environment:
      MYSQL_ROOT_PASSWORD: opik
      MYSQL_DATABASE: opik
      MYSQL_USER: opik
      MYSQL_PASSWORD: opik
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent" ]
      timeout: 1s
      interval: 5s
      retries: 60
      start_period: 60s
    volumes:
      - opik_mysql:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M

  opik-redis:
    profiles: [ "llm-monitoring" ]
    image: redis:7.2.4-alpine3.19
    container_name: opik-redis
    command: redis-server --requirepass opik --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "6379" ]
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 60s
    volumes:
      - opik_redis:/data
    deploy:
      resources:
        limits:
          memory: 128M

  opik-zookeeper:
    profiles: [ "llm-monitoring" ]
    image: zookeeper:3.8.0
    container_name: opik-zookeeper
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "ruok"
    healthcheck:
      test: [ 'CMD-SHELL', 'echo "ruok" | nc localhost 2181 || exit 1' ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s

  opik-clickhouse-init:
    profiles: [ "llm-monitoring" ]
    image: alpine:latest
    volumes:
      - ./clickhouse_config:/clickhouse_config_files
      - opik_clickhouse_config:/config
    command: |
      sh -c "
        cp -r /clickhouse_config_files/* /config/ && 
        chown -R 1000:1000 /config
      "

  opik-clickhouse:
    profiles: [ "llm-monitoring" ]
    image: clickhouse/clickhouse-server:25.3.6.56-alpine
    container_name: opik-clickhouse
    environment:
      CLICKHOUSE_DB: opik
      CLICKHOUSE_USER: opik
      CLICKHOUSE_PASSWORD: opik
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping" ]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 60s
    depends_on:
      opik-zookeeper:
        condition: service_healthy
      opik-clickhouse-init:
        condition: service_completed_successfully
    volumes:
      - opik_clickhouse:/var/lib/clickhouse
      - opik_clickhouse_config:/etc/clickhouse-server/config.d
    deploy:
      resources:
        limits:
          memory: 512M

  opik-backend:
    profiles: [ "llm-monitoring" ]
    image: ghcr.io/comet-ml/opik/opik-backend:latest
    container_name: opik-backend
    command: [ "bash", "-c", "./run_db_migrations.sh && ./entrypoint.sh" ]
    environment:
      STATE_DB_PROTOCOL: "jdbc:mysql://"
      STATE_DB_URL: "opik-mysql:3306/opik?createDatabaseIfNotExist=true&rewriteBatchedStatements=true"
      STATE_DB_DATABASE_NAME: opik
      STATE_DB_USER: opik
      STATE_DB_PASS: opik
      ANALYTICS_DB_MIGRATIONS_URL: "jdbc:clickhouse://opik-clickhouse:8123"
      ANALYTICS_DB_MIGRATIONS_USER: opik
      ANALYTICS_DB_MIGRATIONS_PASS: opik
      ANALYTICS_DB_PROTOCOL: "HTTP"
      ANALYTICS_DB_HOST: "opik-clickhouse"
      ANALYTICS_DB_PORT: 8123
      ANALYTICS_DB_DATABASE_NAME: opik
      ANALYTICS_DB_USERNAME: opik
      ANALYTICS_DB_PASS: opik
      JAVA_OPTS: "-Xmx512m -XX:+UseG1GC -XX:MaxRAMPercentage=80.0"
      REDIS_URL: redis://:opik@opik-redis:6379/
      OPIK_USAGE_REPORT_ENABLED: "false"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health-check" ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 60s
    depends_on:
      opik-mysql:
        condition: service_healthy
      opik-clickhouse:
        condition: service_healthy
      opik-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M

  opik-frontend:
    profiles: [ "llm-monitoring" ]
    image: ghcr.io/comet-ml/opik/opik-frontend:latest
    container_name: opik-frontend
    ports:
      - "5173:80"
    depends_on:
      opik-backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:80/is-alive || exit 1" ]
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      NGINX_PORT: 5173
      OPIK_BACKEND_URL: "http://opik-backend:8080"
    deploy:
      resources:
        limits:
          memory: 128M

  # ==========================================
  # [OPTIONAL: MONITORING]
  # ==========================================
  node_exporter:
    profiles: [ "monitoring" ]
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    command:
      - "--path.procfs=/proc"
      - "--path.sysfs=/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"

  prometheus:
    profiles: [ "monitoring" ]
    image: prom/prometheus:latest
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - node_exporter
      - neo4j
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=72h"
      - "--web.enable-lifecycle"

  grafana:
    profiles: [ "monitoring" ]
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_DISABLE_INITIAL_ADMIN_PASSWORD_CHANGE=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/neo4j-dashboard.json
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  # Core
  postgres-db-volume:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  neo4j_import: # Vector DB

  weaviate_data: # LLM Monitoring (Opik)

  opik_mysql:
  opik_redis:
  opik_clickhouse:
  opik_clickhouse_config: # Infrastructure Monitoring

  prometheus_data:
  grafana_data:
