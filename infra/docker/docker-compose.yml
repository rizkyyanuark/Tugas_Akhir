version: '3.8'
name: tugas_akhir
# ==========================================
# UNIFIED DOCKER COMPOSE FILE UNESA INFOKOM
# ==========================================
# HOW TO RUN (from project root):
# 1. Base Project (Airflow + Neo4j):
#    make dev
#
# 2. With All Profiles:
#    make dev-all
#
# 3. Stop Everything:
#    make down
# ==========================================

services:

  # ==========================================
  # [CORE SYSTEM: AIRFLOW ETL]
  # ==========================================
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-airflow}
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: always

  airflow-init:
    image: apache/airflow:2.8.1-python3.10
    env_file:
      - ../../.env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=airflow
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-airflow}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate &&
      airflow users create 
      --username admin 
      --password ${AIRFLOW_ADMIN_PASSWORD:-rizkyyk715} 
      --firstname Airflow 
      --lastname Admin \
      --role Admin \
      --email admin@example.com || true"

  airflow-webserver:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.airflow
    restart: always
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8080:8080"
    volumes:
      - ../../dags:/opt/airflow/dags
      - ../../src:/opt/airflow/src
      - ../../data:/opt/airflow/data
      - ../../logs:/opt/airflow/logs
      - ../../plugins:/opt/airflow/plugins
      - ../../notebooks:/opt/airflow/notebooks
    command: airflow webserver

  airflow-scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.airflow
    restart: always
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ../../dags:/opt/airflow/dags
      - ../../src:/opt/airflow/src
      - ../../data:/opt/airflow/data
      - ../../logs:/opt/airflow/logs
      - ../../plugins:/opt/airflow/plugins
      - ../../notebooks:/opt/airflow/notebooks
    command: airflow scheduler

  # ==========================================
  # [CORE SYSTEM: GRAPH DATABASE]
  # ==========================================
  neo4j:
    image: neo4j:5.15-enterprise
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=256m
      - NEO4J_initial_dbms_default__database=datascience
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_default__listen__address=0.0.0.0
      - NEO4J_server_http_listen__address=0.0.0.0:7474
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
      - NEO4J_server_bolt_tls__level=DISABLED
      - NEO4J_server_metrics_prometheus_enabled=true
      - NEO4J_server_metrics_prometheus_endpoint=0.0.0.0:2004
      - NEO4J_server_metrics_enabled=true
      - NEO4J_server_metrics_csv_enabled=true
      - NEO4J_server_metrics_csv_interval=30s
      - NEO4J_dbms_security_auth__lock__time=5s
      - NEO4J_dbms_security_procedures_unrestricted=gds.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*
      - NEO4JLABS_PLUGINS=["graph-data-science"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt Protocol
      - "2004:2004" # Prometheus Metrics
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1500m
        reservations:
          cpus: "1"
          memory: 512m

  # ==========================================
  # [OPTIONAL: VECTOR DATABASE (GraphRAG)]
  # ==========================================
  weaviate:
    profiles: ["vectordb"]
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.9
    ports:
      - "8081:8080"
      - "50051:50051"
      - "2112:2112"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "text2vec-transformers"
      ENABLE_MODULES: "text2vec-transformers"
      TRANSFORMERS_INFERENCE_API: "http://t2v-transformers:8080"
      CLUSTER_HOSTNAME: "node1"
      PROMETHEUS_MONITORING_ENABLED: "true"
      PROMETHEUS_MONITORING_GROUP: "weaviate"
      QUERY_MAXIMUM_RESULTS: 10000
      GOMEMLIMIT: "1536MiB"
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  t2v-transformers:
    profiles: ["vectordb"]
    image: cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-paraphrase-multilingual-MiniLM-L12-v2
    environment:
      ENABLE_CUDA: "0"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ==========================================
  # [OPTIONAL: MONITORING]
  # ==========================================
  node_exporter:
    profiles: ["monitoring"]
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    command:
      - "--path.procfs=/proc"
      - "--path.sysfs=/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - node_exporter
      - neo4j
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=72h"
      - "--web.enable-lifecycle"

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_DISABLE_INITIAL_ADMIN_PASSWORD_CHANGE=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/neo4j-dashboard.json
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  # Core
  postgres-db-volume:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  neo4j_import:
  # Vector DB
  weaviate_data:
  # Monitoring
  prometheus_data:
  grafana_data:
