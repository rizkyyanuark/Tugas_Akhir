# AIRFLOW (Main)
server {
    listen 80;
    server_name airflow.tugasakhir.space;

    resolver 127.0.0.11 valid=30s;
    set $upstream_airflow http://airflow-webserver:8080;

    location / {
        proxy_pass $upstream_airflow;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }
}

# NEO4J
server {
    listen 80;
    server_name neo4j.tugasakhir.space;

    resolver 127.0.0.11 valid=30s;
    set $upstream_neo4j http://neo4j:7474;

    location / {
        proxy_pass $upstream_neo4j;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 300;
        proxy_read_timeout 300;
    }

    # Handling Neo4j internal redirects
    location /browser {
        proxy_pass $upstream_neo4j/browser;
        proxy_set_header Host $host;
        proxy_connect_timeout 300;
        proxy_read_timeout 300;
    }
}

