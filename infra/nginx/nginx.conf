# WEAVIATE
server {
    listen 80;
    server_name weaviate.tugasakhir.space;

    location / {
        proxy_pass http://weaviate:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Weaviate specific timeouts
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
    }
}

# OPIK (LLM Monitoring)
server {
    listen 80;
    server_name opik.tugasakhir.space;

    location / {
        proxy_pass http://opik-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# DEFAULT (Direct IP Access)
server {
    listen 80 default_server;
    server_name _;

    # Weaviate API via direct IP
    location /v1 {
        proxy_pass http://weaviate:8080/v1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    # Airflow fallback
    location / {
        proxy_pass http://airflow-webserver:8080;
        proxy_set_header Host $host;
    }
}

# Root domain redirect
server {
    listen 80;
    server_name tugasakhir.space www.tugasakhir.space;
    return 301 http://airflow.tugasakhir.space$request_uri;
}
