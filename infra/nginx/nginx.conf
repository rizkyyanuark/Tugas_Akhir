# WEAVIATE
server {
    listen 80;
    server_name weaviate.tugasakhir.space;

    location / {
        proxy_pass http://weaviate:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Weaviate specific timeouts
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
    }
}

# OPIK (LLM Monitoring)
server {
    listen 80;
    server_name opik.tugasakhir.space;

    # API calls from Opik Python SDK → Backend Java
    location /api {
        proxy_pass http://opik-backend:8080/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # Frontend SPA (Dashboard UI)
    location / {
        proxy_pass http://opik-frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SPA Routing Fix: Intercept 404 from upstream and serve index.html
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # Internal endpoint to serve index.html for SPA fallback
    location = /index.html {
        proxy_pass http://opik-frontend:5173/index.html;
        internal;
    }
}

# DEFAULT (Direct IP Access)
server {
    listen 80 default_server;
    server_name _;

    # Weaviate API via direct IP
    location /v1 {
        proxy_pass http://weaviate:8080/v1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    # Airflow fallback
    location / {
        proxy_pass http://airflow-webserver:8080;
        proxy_set_header Host $host;
    }
}

# STREAMLIT FRONTEND
server {
    listen 80;
    server_name app.tugasakhir.space;

    location / {
        proxy_pass http://streamlit:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# Root domain redirect
server {
    listen 80;
    server_name tugasakhir.space www.tugasakhir.space;
    return 301 http://airflow.tugasakhir.space$request_uri;
}
