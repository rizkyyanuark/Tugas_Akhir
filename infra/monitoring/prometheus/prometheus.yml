global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "unesa-kg-monitor"
    environment: "production"

scrape_configs:
  # Node Exporter (Host-level system metrics: CPU, RAM, Disk, Network)
  - job_name: "node"
    static_configs:
      - targets: ["node_exporter:9100"]
    scrape_interval: 15s

  # cAdvisor (Container-level metrics: per-container CPU, Memory, Network)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 15s

  # Neo4j Metrics (Community Edition - may require enterprise for full metrics)
  - job_name: "neo4j"
    static_configs:
      - targets: ["neo4j:2004"]
    metrics_path: /metrics
    scheme: http
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 30s
