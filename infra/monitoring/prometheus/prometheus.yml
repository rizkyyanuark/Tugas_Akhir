global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "unesa-kg-monitor"
    environment: "development"

scrape_configs:
  # Neo4j Metrics (Built-in Prometheus endpoint)
  - job_name: "neo4j"
    static_configs:
      - targets: ["neo4j:2004"]
    metrics_path: /metrics
    scheme: http
    scrape_interval: 10s

  # Weaviate Metrics (Built-in Prometheus endpoint)
  - job_name: "weaviate"
    static_configs:
      - targets: ["weaviate:2112"]
    metrics_path: /metrics
    scheme: http
    scrape_interval: 10s

  # Node Exporter (System metrics)
  - job_name: "node"
    static_configs:
      - targets: ["node_exporter:9100"]
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 30s
